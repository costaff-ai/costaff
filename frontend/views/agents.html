<!-- Cockpit agent component view. Shell renders the breadcrumb + agent header
     + tabbed component panel (MCPs / APIs / Skills / Logs) into #ck-agentview. -->
<div class="ck-panel">
    <div id="ck-agentview">
        <div class="ck-ph">
            <i class="fas fa-diagram-project"></i>
            <p>Select an agent from the sidebar</p>
        </div>
    </div>
</div>

<!-- Add External Agent Modal -->
<div id="add-ext-agent-modal" class="hidden fixed inset-0 bg-black/50 flex items-center justify-center z-50">
    <div class="bg-white rounded-3xl shadow-2xl p-8 w-full max-w-md mx-4">
        <h3 class="text-xl font-headline font-bold text-slate-900 uppercase tracking-tight mb-6">Add External Agent</h3>
        <div class="space-y-4">
            <div>
                <label class="text-[10px] font-bold text-slate-500 uppercase tracking-widest">Agent Name</label>
                <input id="ext-agent-input-name" type="text" placeholder="e.g. market-analyst"
                    class="mt-1 w-full px-4 py-2.5 border border-slate-200 rounded-xl text-sm focus:outline-none focus:border-blue-400">
                <p class="text-[10px] text-slate-400 mt-1">Lowercase, hyphens allowed</p>
            </div>
            <div>
                <label class="text-[10px] font-bold text-slate-500 uppercase tracking-widest">A2A Endpoint URL</label>
                <input id="ext-agent-input-url" type="text" placeholder="http://expert-analyst.ai"
                    class="mt-1 w-full px-4 py-2.5 border border-slate-200 rounded-xl text-sm focus:outline-none focus:border-blue-400">
            </div>
            <div>
                <label class="text-[10px] font-bold text-slate-500 uppercase tracking-widest">Description (optional)</label>
                <input id="ext-agent-input-desc" type="text" placeholder="What does this agent do?"
                    class="mt-1 w-full px-4 py-2.5 border border-slate-200 rounded-xl text-sm focus:outline-none focus:border-blue-400">
            </div>
        </div>
        <div class="flex gap-3 mt-8">
            <button onclick="UI.closeAddExternalAgentModal()" class="flex-1 px-4 py-2.5 border border-slate-200 rounded-xl text-xs font-black uppercase tracking-widest text-slate-500 hover:bg-slate-50 transition-all">Cancel</button>
            <button onclick="UI.submitAddExternalAgent()" class="flex-1 px-4 py-2.5 bg-blue-600 text-white rounded-xl text-xs font-black uppercase tracking-widest hover:bg-blue-700 transition-all">Add Agent</button>
        </div>
    </div>
</div>
