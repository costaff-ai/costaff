<div class="p-8">
    <div class="flex items-center justify-between mb-6 flex-wrap gap-3">
        <h3 class="text-lg font-black uppercase tracking-widest text-slate-900">Business Platforms</h3>
        <div class="flex items-center gap-2 flex-wrap">
            <div class="relative">
                <i class="fas fa-search absolute left-3 top-1/2 -translate-y-1/2 text-[10px] text-slate-300"></i>
                <input id="plat-search" oninput="Platforms.setSearch(this.value)" placeholder="Search…"
                    class="pl-8 pr-3 py-2 rounded-xl text-xs border border-slate-200 bg-white text-slate-600 focus:outline-none focus:border-blue-400 w-40">
            </div>
            <select id="plat-status" onchange="Platforms.setStatus(this.value)"
                class="text-[11px] font-bold uppercase tracking-wider border border-slate-200 rounded-xl px-3 py-2 bg-white text-slate-600 focus:outline-none focus:border-blue-400 cursor-pointer">
                <option value="__all__">All statuses</option>
                <option value="healthy">Healthy</option>
                <option value="unhealthy">Starting</option>
                <option value="down">Down</option>
                <option value="n/a">Disabled</option>
            </select>
            <div class="flex rounded-xl border border-slate-200 overflow-hidden">
                <button id="plat-view-cards" onclick="Platforms.setView('cards')" title="Card view" class="px-3 py-2 text-xs text-slate-500"><i class="fas fa-table-cells-large"></i></button>
                <button id="plat-view-list" onclick="Platforms.setView('list')" title="List view" class="px-3 py-2 text-xs text-slate-500 border-l border-slate-200"><i class="fas fa-list"></i></button>
            </div>
            <button onclick="Platforms.load()" class="px-4 py-2 rounded-xl text-xs font-black uppercase tracking-widest bg-slate-100 text-slate-600 hover:bg-slate-200 transition-all">
                <i class="fas fa-rotate-right mr-1"></i>Refresh
            </button>
            <button onclick="Platforms.openStore()" class="px-4 py-2 rounded-xl text-xs font-black uppercase tracking-widest bg-blue-600 text-white hover:bg-blue-700 transition-all shadow-lg shadow-blue-600/20">
                <i class="fas fa-plus mr-1"></i>Add Platform
            </button>
        </div>
    </div>
    <div id="platforms-count" class="text-[11px] font-mono text-slate-400 mb-3"></div>
    <div id="platforms-list"></div>
</div>

<!-- Platform Store Modal (pick an app → set its URL) -->
<div id="plat-store-modal" class="fixed inset-0 z-[150] flex items-center justify-center bg-slate-900/40 backdrop-blur-sm hidden">
    <div class="bg-white border border-slate-100 rounded-[2.5rem] w-full max-w-2xl shadow-2xl overflow-hidden animate-in fade-in zoom-in duration-300 flex flex-col max-h-[90vh]">
        <div class="p-8 border-b border-slate-100 flex justify-between items-center bg-slate-50/50">
            <div>
                <h3 id="plat-store-title" class="text-xl font-bold text-slate-900">Add Platform</h3>
                <p id="plat-store-subtitle" class="text-xs text-slate-500 mt-1 font-bold uppercase tracking-widest">Pick an app, then point it at your instance</p>
            </div>
            <button onclick="Platforms.closeStore()" class="text-slate-400 hover:text-slate-600"><i class="fas fa-times text-xl"></i></button>
        </div>

        <!-- Step 1: catalog shelf -->
        <div id="plat-store-shelf" class="flex-1 overflow-y-auto p-8 custom-scrollbar">
            <div id="plat-catalog-grid" class="grid grid-cols-2 md:grid-cols-3 gap-3">
                <div class="col-span-full text-center text-slate-400 py-8 text-sm font-mono">Loading catalog…</div>
            </div>
        </div>

        <!-- Step 2: URL setup form -->
        <form id="plat-store-form" class="flex-1 overflow-y-auto p-8 custom-scrollbar space-y-5 hidden">
            <div class="flex items-center gap-4 p-4 rounded-2xl bg-slate-50 border border-slate-100">
                <div class="w-12 h-12 rounded-xl bg-white border border-slate-100 flex items-center justify-center text-blue-600 shrink-0">
                    <i id="plat-f-icon" class="fas fa-cube text-xl"></i>
                </div>
                <div class="min-w-0">
                    <div id="plat-f-name-label" class="text-sm font-black text-slate-900 uppercase tracking-wide">—</div>
                    <div id="plat-f-desc-label" class="text-[11px] text-slate-400 truncate"></div>
                </div>
            </div>
            <div id="plat-f-name-row" class="hidden">
                <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest block mb-2">Name</label>
                <input type="text" id="plat-f-name" placeholder="my-platform" class="w-full bg-slate-50 border-none rounded-xl px-4 py-3 text-slate-900 focus:ring-2 focus:ring-blue-500 transition-all">
            </div>
            <div>
                <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest block mb-2">Frontend URL</label>
                <input type="text" id="plat-f-url" required placeholder="http://192.168.1.10:18210 or https://erp.example.com" class="w-full bg-slate-50 border-none rounded-xl px-4 py-3 font-mono text-sm text-slate-900 focus:ring-2 focus:ring-blue-500 transition-all">
            </div>
            <div>
                <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest block mb-2">MCP URL (Optional)</label>
                <input type="text" id="plat-f-mcp" placeholder="http://host:port/mcp — lets agents operate this platform" class="w-full bg-slate-50 border-none rounded-xl px-4 py-3 font-mono text-sm text-slate-900 focus:ring-2 focus:ring-blue-500 transition-all">
            </div>
            <div>
                <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest block mb-2">Description (Optional)</label>
                <input type="text" id="plat-f-desc" class="w-full bg-slate-50 border-none rounded-xl px-4 py-3 text-slate-900 focus:ring-2 focus:ring-blue-500 transition-all">
            </div>
            <div class="pt-2 flex gap-4">
                <button type="button" id="plat-store-back" onclick="Platforms.storeBack()" class="flex-1 px-6 py-4 rounded-xl font-bold text-slate-400 hover:bg-slate-50 transition-all">BACK</button>
                <button type="submit" class="flex-1 bg-blue-600 hover:bg-blue-700 text-white px-6 py-4 rounded-xl font-bold shadow-lg shadow-blue-100 transition-all active:scale-95">SAVE</button>
            </div>
        </form>
    </div>
</div>
