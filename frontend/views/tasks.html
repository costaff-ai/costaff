<div class="flex gap-6 h-[calc(100vh-160px)]">

    <!-- Left: Epic Sidebar -->
    <div id="epic-sidebar" class="w-72 flex flex-col bg-white border border-slate-100 rounded-[2rem] shadow-xl overflow-hidden shrink-0">
        <div class="p-5 border-b border-slate-100 bg-slate-50/50 flex items-center justify-between">
            <div>
                <span class="text-xs font-bold text-slate-500 uppercase tracking-widest">Projects</span>
                <p id="epic-count" class="text-[10px] text-slate-400 font-medium mt-0.5">— epics</p>
            </div>
            <button onclick="Projects.openAddModal()" class="w-8 h-8 rounded-xl bg-blue-600 text-white flex items-center justify-center hover:scale-110 transition-transform shadow-lg shadow-blue-200">
                <i class="fas fa-plus text-[10px]"></i>
            </button>
        </div>
        <div id="epic-sidebar-list" class="flex-1 overflow-y-auto divide-y divide-slate-50 custom-scrollbar">
            <div class="flex items-center justify-center h-20 text-slate-300 text-[10px] font-bold uppercase tracking-widest">Loading...</div>
        </div>
    </div>

    <!-- Right: Story / Task Panel -->
    <div class="flex-1 flex flex-col bg-white border border-slate-100 rounded-[2rem] shadow-xl overflow-hidden">

        <!-- Placeholder -->
        <div id="story-placeholder" class="flex-1 flex flex-col items-center justify-center opacity-20 uppercase tracking-[0.5em] font-headline text-slate-400">
            <i class="fas fa-project-diagram text-6xl mb-8"></i>
            <p>Select a Project</p>
        </div>

        <!-- Story Panel -->
        <div id="story-panel" class="hidden flex-1 flex-col overflow-hidden">
            <div class="px-8 py-5 border-b border-slate-100 bg-slate-50/50 shrink-0 flex items-center gap-4">
                <div class="min-w-0 flex-1">
                    <h2 id="epic-panel-title" class="text-2xl font-headline font-bold text-slate-900 tracking-tighter uppercase truncate">—</h2>
                    <p id="epic-panel-desc" class="text-[10px] text-slate-400 font-bold uppercase tracking-widest mt-0.5 truncate">—</p>
                </div>
                <div class="flex items-center gap-2 shrink-0">
                    <button id="kanban-fullscreen-btn" onclick="Projects.toggleKanbanFullscreen()" title="Toggle fullscreen kanban"
                        class="hidden w-8 h-8 rounded-xl bg-slate-100 hover:bg-slate-200 text-slate-500 flex items-center justify-center transition-all">
                        <i class="fas fa-expand text-[10px]"></i>
                    </button>
                    <div class="flex items-center gap-1 bg-slate-100 rounded-xl p-1">
                        <button id="view-toggle-list" onclick="Projects.switchView('list')" class="px-3 py-1.5 rounded-lg text-xs font-bold bg-blue-600 text-white transition-all">
                            <i class="fas fa-list mr-1"></i>List
                        </button>
                        <button id="view-toggle-kanban" onclick="Projects.switchView('kanban')" class="px-3 py-1.5 rounded-lg text-xs font-bold text-slate-400 hover:text-slate-600 transition-all">
                            <i class="fas fa-th-large mr-1"></i>Kanban
                        </button>
                    </div>
                    <button onclick="Projects.openAddStoryModal()" class="px-4 py-2 bg-slate-100 hover:bg-slate-200 text-slate-700 rounded-xl font-bold text-xs transition-all flex items-center gap-2">
                        <i class="fas fa-plus text-[10px]"></i> Story
                    </button>
                    <button onclick="Projects.openAddTaskPrompt()" class="px-4 py-2 bg-blue-600 hover:bg-blue-700 text-white rounded-xl font-bold text-xs transition-all flex items-center gap-2 shadow-lg shadow-blue-100 active:scale-95">
                        <i class="fas fa-robot text-[10px]"></i> Task
                    </button>
                </div>
            </div>
            <div id="story-list" class="flex-1 overflow-y-auto custom-scrollbar">
            </div>
        </div>
    </div>
</div>

<!-- Epic / Story Add Modal -->
<div id="project-modal" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-[60] hidden flex items-center justify-center p-6">
    <div class="bg-white rounded-3xl w-full max-w-lg shadow-2xl overflow-hidden animate-in fade-in zoom-in duration-200">
        <div class="p-8 border-b border-slate-100 flex justify-between items-center bg-slate-50/50">
            <div>
                <h3 id="project-modal-title" class="text-xl font-bold text-slate-900">New Epic</h3>
                <p class="text-slate-500 text-sm">Define a long-term goal or project.</p>
            </div>
            <button onclick="Projects.closeModal()" class="text-slate-400 hover:text-slate-600 transition-colors">
                <i class="fas fa-times text-xl"></i>
            </button>
        </div>
        <form id="project-form" class="p-8 space-y-5">
            <input type="hidden" id="pf-mode">
            <input type="hidden" id="pf-parent-id">
            <div>
                <label class="block text-xs font-bold text-slate-400 mb-2 tracking-widest uppercase">Title</label>
                <input type="text" id="pf-title" required placeholder="e.g. CoStaff Development" class="w-full bg-slate-50 border-none rounded-xl px-4 py-3 text-slate-900 focus:ring-2 focus:ring-blue-500 transition-all">
            </div>
            <div>
                <label class="block text-xs font-bold text-slate-400 mb-2 tracking-widest uppercase">Description <span class="text-slate-300">(optional)</span></label>
                <textarea id="pf-description" rows="3" placeholder="Brief description..." class="w-full bg-slate-50 border-none rounded-xl px-4 py-3 text-slate-900 focus:ring-2 focus:ring-blue-500 transition-all resize-none"></textarea>
            </div>
            <div id="pf-priority-row" class="hidden">
                <label class="block text-xs font-bold text-slate-400 mb-2 tracking-widest uppercase">Priority</label>
                <select id="pf-priority" class="w-full bg-slate-50 border-none rounded-xl px-4 py-3 text-slate-900 focus:ring-2 focus:ring-blue-500 transition-all">
                    <option value="high">High</option>
                    <option value="medium" selected>Medium</option>
                    <option value="low">Low</option>
                </select>
            </div>
            <div class="pt-4 flex gap-4">
                <button type="button" onclick="Projects.closeModal()" class="flex-1 px-6 py-4 rounded-xl font-bold text-slate-400 hover:bg-slate-50 transition-all">CANCEL</button>
                <button type="submit" class="flex-1 bg-blue-600 hover:bg-blue-700 text-white px-6 py-4 rounded-xl font-bold shadow-lg shadow-blue-100 transition-all active:scale-95">SAVE</button>
            </div>
        </form>
    </div>
</div>

<style>
#td-spec{line-height:1.7}
#td-spec h1{font-size:1.35rem;font-weight:800;color:#0f172a;margin:0 0 .75rem;letter-spacing:-.01em}
#td-spec h2{font-size:1.05rem;font-weight:700;color:#1e293b;margin:1.5rem 0 .5rem;padding-bottom:.4rem;border-bottom:2px solid #e2e8f0}
#td-spec h3{font-size:.85rem;font-weight:700;color:#334155;margin:1.1rem 0 .35rem}
#td-spec h4{font-size:.75rem;font-weight:700;color:#64748b;margin:.75rem 0 .25rem;text-transform:uppercase;letter-spacing:.06em}
#td-spec p{margin:.5rem 0;color:#475569;font-size:.875rem}
#td-spec ul,#td-spec ol{margin:.5rem 0 .5rem 1.4rem}
#td-spec li{margin:.3rem 0;color:#475569;font-size:.875rem}
#td-spec li input[type=checkbox]{margin-right:.4rem;accent-color:#3b82f6}
#td-spec strong{color:#0f172a;font-weight:700}
#td-spec code{background:#eff6ff;color:#2563eb;padding:.15rem .35rem;border-radius:.3rem;font-size:.8em;font-family:monospace}
#td-spec hr{border:none;border-top:1px solid #e2e8f0;margin:1rem 0}
#td-spec blockquote{border-left:3px solid #3b82f6;padding:.25rem .75rem;margin:.5rem 0;color:#64748b;background:#f8fafc;border-radius:0 .5rem .5rem 0}
</style>

<!-- Task Detail Modal -->
<div id="task-detail-modal" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-[60] hidden flex items-center justify-center p-6">
    <div class="bg-white rounded-3xl w-full max-w-2xl shadow-2xl overflow-hidden animate-in fade-in zoom-in duration-200 flex flex-col max-h-[90vh]">
        <div class="p-8 border-b border-slate-100 flex justify-between items-center bg-slate-50/50">
            <div>
                <h3 id="td-title" class="text-xl font-bold text-slate-900">Task Details</h3>
                <p id="td-id" class="text-slate-400 text-[10px] font-mono mt-1 uppercase tracking-wider"></p>
            </div>
            <button onclick="Projects.closeTaskDetail()" class="text-slate-400 hover:text-slate-600 transition-colors">
                <i class="fas fa-times text-xl"></i>
            </button>
        </div>
        <div class="flex-1 overflow-y-auto p-8 custom-scrollbar space-y-6">
            <div>
                <span class="text-[10px] font-bold text-slate-400 uppercase tracking-widest block mb-2">Spec</span>
                <div id="td-spec" class="text-sm text-slate-700 leading-relaxed bg-slate-50 rounded-xl p-4 prose prose-sm max-w-none prose-headings:font-bold prose-headings:text-slate-800 prose-h1:text-base prose-h2:text-sm prose-h3:text-xs prose-h3:uppercase prose-h3:tracking-widest prose-h3:text-slate-500 prose-strong:text-slate-800 prose-li:marker:text-blue-400 prose-code:bg-white prose-code:px-1 prose-code:rounded prose-code:text-blue-600"></div>
            </div>
            <div class="grid grid-cols-3 gap-4">
                <div>
                    <span class="text-[10px] font-bold text-slate-400 uppercase tracking-widest block mb-1">Status</span>
                    <p id="td-status" class="text-sm font-bold text-blue-600"></p>
                </div>
                <div>
                    <span class="text-[10px] font-bold text-slate-400 uppercase tracking-widest block mb-1">Agent</span>
                    <p id="td-agent" class="text-sm font-bold text-purple-600"></p>
                </div>
                <div>
                    <span class="text-[10px] font-bold text-slate-400 uppercase tracking-widest block mb-1">Priority</span>
                    <p id="td-priority" class="text-sm font-bold text-amber-600"></p>
                </div>
            </div>
            <div>
                <h4 class="text-xs font-black text-slate-400 mb-3 tracking-widest uppercase flex items-center gap-2">
                    <i class="fas fa-comments text-blue-500"></i> Comments / Results
                </h4>
                <div id="td-comments" class="space-y-3">
                    <div class="text-center py-8 text-slate-300 text-xs font-bold">Loading...</div>
                </div>
            </div>
        </div>
    </div>
</div>
