<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Content Security Policy: the dashboard renders untrusted content
         (docker logs, chat/session history, agent output) so an injected
         payload is a real risk. connect-src/img-src 'self' block the practical
         harm — exfiltrating the admin token to an external host — while the
         allow-listed CDNs keep tailwind/marked/DOMPurify/font-awesome working.
         (script-src keeps 'unsafe-inline'/'unsafe-eval' because the app relies
         on inline onclick handlers and the tailwind Play CDN.) -->
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://cdn.tailwindcss.com https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://cdnjs.cloudflare.com https://cdn.tailwindcss.com; font-src 'self' data: https://cdnjs.cloudflare.com; img-src 'self' data:; connect-src 'self'; object-src 'none'; base-uri 'self'; form-action 'self'">
    <title>CoStaff Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/cockpit.css?v=11">
    <style>
        /* Force light theme colors based on snapshots */
        body.light-mode {
            background-color: #f0f2f5;
            color: #1a1d1e;
        }
        body.light-mode .sidebar-group-label {
            color: #9ca3af;
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            padding: 1.5rem 1.5rem 0.5rem;
        }
        body.light-mode main header {
            background-color: transparent;
            border-bottom: 1px solid #e5e7eb;
        }
        body.light-mode #view-title {
            color: #111827;
        }
        /* Auth Overlay */
        body.light-mode #auth-overlay { background-color: rgba(240,242,245,0.85); backdrop-filter: blur(12px); }
        #auth-overlay { background-color: rgba(10,13,22,0.8); backdrop-filter: blur(12px); }
    </style>
</head>
<body class="flex h-screen light-mode">

    <!-- Design System Ambient Background -->
    <div class="ambient-blobs pointer-events-none">
        <div class="blob w-[900px] h-[1400px] bg-blue-600/10 top-[-20%] left-1/2 -translate-x-1/2"></div>
    </div>
    <div class="grid-overlay pointer-events-none"></div>

    <!-- Auth Overlay -->
    <section id="auth-overlay" class="fixed inset-0 z-[100] flex items-center justify-center hidden">
        <div class="bg-white p-10 rounded-3xl border border-slate-200 w-full max-w-md shadow-2xl flex flex-col items-center">
            <div class="flex flex-col items-center mb-10 w-full">
                <div class="w-20 h-20 bg-blue-600 rounded-2xl flex items-center justify-center mb-6 shadow-lg shadow-blue-200">
                    <i class="fas fa-robot text-white text-3xl"></i>
                </div>
                <h2 class="text-4xl font-bold text-slate-900 tracking-tight mb-1">CoStaff</h2>
                <p class="text-slate-500 text-sm font-medium">Your AI Staff, Ready to Work.</p>
            </div>

            <form id="auth-form" class="space-y-5 w-full">
                <div class="space-y-1">
                    <label class="text-xs font-bold text-slate-500 uppercase ml-1">Account</label>
                    <input type="text" id="username" placeholder="Enter your account" required class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 outline-none focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 transition-all text-slate-900">
                </div>
                <div class="space-y-1">
                    <label class="text-xs font-bold text-slate-500 uppercase ml-1">Password</label>
                    <input type="password" id="password" placeholder="Enter your password" required class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 outline-none focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 transition-all text-slate-900">
                </div>
                <div id="auth-hint" class="text-blue-500 text-xs text-center hidden font-bold">FIRST TIME SETUP — ENTER YOUR CREDENTIALS TO CREATE AN ACCOUNT</div>
                <div id="auth-error" class="text-red-500 text-xs text-center hidden font-bold">Access Denied</div>
                <button id="auth-submit-btn" type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-xl shadow-lg shadow-blue-100 transition-all active:scale-[0.98]">Login</button>
            </form>
        </div>
    </section>

    <!-- Sidebar -->
    <aside id="sidebar" class="ck w-64 flex flex-col hidden shrink-0 transition-all">
        <div class="px-5 pt-6 pb-3 shrink-0">
            <div class="ck-brand mb-4">
                <i class="fas fa-robot text-2xl"></i>
                <span>CoStaff</span>
            </div>
            <!-- Tier 0: System (core) switcher -->
            <div id="system-switcher"></div>
        </div>

        <nav id="main-nav" class="flex-1 pb-10 overflow-y-auto custom-scrollbar px-2">
            <!-- Tier 1: Manager Agent (pinned, expandable tree — Shell-populated) -->
            <div class="ck-grp">Manager Agent</div>
            <div id="nav-manager"></div>

            <!-- Tier 1: External Agents (grouped tree, Shell-populated) -->
            <div id="nav-external"></div>

            <div class="sidebar-group-label">Workspace</div>
            <button data-tab="dashboard" class="sidebar-item w-full flex items-center gap-3 px-6 py-3 transition-all font-bold text-sm">
                <i class="fas fa-th-large w-5 text-center"></i> Dashboard
            </button>
            <button data-tab="chat" class="sidebar-item w-full flex items-center gap-3 px-6 py-3 transition-all font-bold text-sm">
                <i class="fas fa-comments w-5 text-center"></i> Chat
            </button>

            <div class="sidebar-group-label">AI Team</div>
            <button data-tab="cronjobs" class="sidebar-item w-full flex items-center gap-3 px-6 py-3 transition-all font-bold text-sm">
                <i class="fas fa-sync-alt w-5 text-center"></i> Regular Work
            </button>
            <button data-tab="tasks" class="sidebar-item w-full flex items-center gap-3 px-6 py-3 transition-all font-bold text-sm">
                <i class="fas fa-project-diagram w-5 text-center"></i> Projects
            </button>
            <button data-tab="diary" class="sidebar-item w-full flex items-center gap-3 px-6 py-3 transition-all font-bold text-sm">
                <i class="fas fa-book w-5 text-center"></i> Diary
            </button>

            <div class="sidebar-group-label">Control</div>
            <button data-tab="users" class="sidebar-item w-full flex items-center gap-3 px-6 py-3 transition-all font-bold text-sm">
                <i class="fas fa-users w-5 text-center"></i> Users
            </button>
            <button data-tab="gateways" class="sidebar-item w-full flex items-center gap-3 px-6 py-3 transition-all font-bold text-sm">
                <i class="fas fa-network-wired w-5 text-center"></i> Channels
            </button>
            <button data-tab="platforms" class="sidebar-item w-full flex items-center gap-3 px-6 py-3 transition-all font-bold text-sm">
                <i class="fas fa-cubes w-5 text-center"></i> Platforms
            </button>
            <button data-tab="sessions" class="sidebar-item w-full flex items-center gap-3 px-6 py-3 transition-all font-bold text-sm">
                <i class="fas fa-history w-5 text-center"></i> Sessions
            </button>

            <div class="sidebar-group-label">Settings</div>
            <button data-tab="config" class="sidebar-item w-full flex items-center gap-3 px-6 py-3 transition-all font-bold text-sm">
                <i class="fas fa-sliders-h w-5 text-center"></i> Config
            </button>
            <button data-tab="logs" class="sidebar-item w-full flex items-center gap-3 px-6 py-3 transition-all font-bold text-sm">
                <i class="fas fa-terminal w-5 text-center"></i> Logs
            </button>
        </nav>

        <div class="mt-auto p-5" style="border-top:1px solid var(--ck-border)">
            <button onclick="App.logout()" class="ck-logout flex items-center gap-3 w-full px-4 py-3 rounded-xl font-bold text-sm transition-colors">
                <i class="fas fa-power-off w-5 text-center"></i> Logout
            </button>
        </div>
    </aside>

    <!-- Main View -->
    <main id="main-view" class="flex-1 flex flex-col overflow-hidden hidden">
        <header class="h-20 flex items-center justify-between px-10">
            <h2 id="view-title" class="text-2xl font-bold tracking-tight">Overview</h2>
            <div class="flex items-center gap-4">
                <div id="core-switcher"></div>
                <div id="header-actions" class="flex items-center gap-4"></div>
            </div>
        </header>

        <div id="content-area" class="flex-1 overflow-y-auto custom-scrollbar p-10">
            <div id="view-dashboard" class="main-tab-view hidden"></div>
            <div id="view-users" class="main-tab-view hidden"></div>
            <div id="view-tasks" class="main-tab-view hidden h-full"></div>
            <div id="view-gateways" class="main-tab-view hidden"></div>
            <div id="view-platforms" class="main-tab-view hidden"></div>
            <div id="view-sessions" class="main-tab-view hidden"></div>
            <div id="view-information" class="main-tab-view hidden"></div>
            <div id="view-cronjobs" class="main-tab-view hidden"></div>
            <div id="view-agents" class="main-tab-view hidden"></div>
            <div id="view-mcps" class="main-tab-view hidden"></div>
            <div id="view-logs" class="main-tab-view hidden"></div>
            <div id="view-apis" class="main-tab-view hidden"></div>
            <div id="view-skills" class="main-tab-view hidden"></div>
            <div id="view-chat" class="main-tab-view hidden h-full flex"></div>
            <div id="view-config" class="main-tab-view hidden"></div>
            <div id="view-docs" class="main-tab-view hidden"></div>
            <div id="view-diary" class="main-tab-view hidden"></div>
        </div>
    </main>

    <!-- Modals -->
    <div id="modal-container" class="fixed inset-0 z-[200] flex items-center justify-center bg-slate-900/40 backdrop-blur-sm hidden">
        <div class="bg-white w-full max-w-md rounded-3xl shadow-2xl border border-slate-200 overflow-hidden">
            <div class="px-8 py-5 border-b border-slate-100 flex items-center justify-between">
                <h3 id="modal-title" class="text-lg font-bold text-slate-900">System Action</h3>
                <button onclick="UI.closeModal()" class="text-slate-400 hover:text-slate-600"><i class="fas fa-times"></i></button>
            </div>
            <div class="p-8">
                <div class="space-y-2">
                    <label class="text-xs font-bold text-slate-500 uppercase block ml-1">Name</label>
                    <input type="text" id="modal-input" class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 outline-none focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 text-slate-900">
                </div>
                <div class="mt-8 flex gap-3">
                    <button onclick="UI.closeModal()" class="flex-1 px-4 py-3 rounded-xl font-bold text-slate-500 hover:bg-slate-50 transition-all">CANCEL</button>
                    <button id="modal-confirm" class="flex-1 px-4 py-3 bg-blue-600 text-white rounded-xl font-bold hover:bg-blue-700 transition-all">CONFIRM</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <!-- Pinned + SRI: floating "marked/marked.min.js" could ship a breaking
         major or a compromised build silently. DOMPurify sanitizes the HTML
         marked emits (see UI.parseMarkdown). -->
    <script src="https://cdn.jsdelivr.net/npm/marked@12.0.2/marked.min.js" integrity="sha384-/TQbtLCAerC3jgaim+N78RZSDYV7ryeoBCVqTuzRrFec2akfBkHS7ACQ3PQhvMVi" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/dompurify@3.2.4/dist/purify.min.js" integrity="sha384-eEu5CTj3qGvu9PdJuS+YlkNi7d2XxQROAFYOr59zgObtlcux1ae1Il3u7jvdCSWu" crossorigin="anonymous"></script>
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#2563eb",
                        "accent": "#2563eb",
                        "accent-high": "#1d4ed8"
                    }
                }
            }
        }
    </script>
    <script src="js/config.js?v=13"></script>
    <script src="js/httpClient.js?v=13"></script>
    <script src="js/ui-core.js?v=13"></script>
    <script src="js/ui-dashboard.js?v=13"></script>
    <script src="js/ui-users.js?v=13"></script>
    <script src="js/ui-sessions.js?v=13"></script>
    <script src="js/ui-chat.js?v=13"></script>
    <script src="js/ui-mcp.js?v=13"></script>
    <script src="js/ui-gateways.js?v=13"></script>
    <script src="js/ui-platforms.js?v=13"></script>
    <script src="js/ui-agents.js?v=13"></script>
    <script src="js/ui-logs.js?v=13"></script>
    <script src="js/ui-cronjobs.js?v=13"></script>
    <script src="js/projects.js?v=13"></script>
    <script src="js/regular-work.js?v=13"></script>
    <script src="js/apisView.js?v=13"></script>
    <script src="js/skills.js?v=13"></script>
    <script src="js/diary.js?v=13"></script>
    <script src="js/cores.js?v=13"></script>
    <script src="js/shell.js?v=13"></script>
    <script src="js/app.js?v=13"></script>
</body>
</html>
