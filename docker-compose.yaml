services:
  costaff-mcp-costaff:
    build: .
    container_name: costaff-mcp-costaff
    restart: always
    volumes:
      # `:?` makes compose fail loudly when the var is missing instead of
      # silently mounting an anonymous volume (or `/shared` from the host
      # root for the manager below). onboard/bootstrap/install.sh write it.
      - ${COSTAFF_WORKSPACE_DIR:?COSTAFF_WORKSPACE_DIR must be set in .env - run costaff onboard}:/app/data
      # Host license mounted read-only. Defaults to /dev/null when no
      # license is applied — load() isfile-guards so that degrades to OSS
      # cleanly instead of crashing. `costaff license apply` sets
      # COSTAFF_LICENSE_HOST_PATH (+ COSTAFF_MACHINE_ID) in .env.
      - ${COSTAFF_LICENSE_HOST_PATH:-/dev/null}:/app/costaff-license.yaml:ro
    env_file:
      - .env
    environment:
      - PYTHONUNBUFFERED=1
      - ADK_API_BASE_URL=http://costaff-agent-costaff:8080
      - PYTHONPATH=/app
      - MCP_SECRET_KEY=${MCP_SECRET_KEY}
      - API_HEADERS_KEY=${API_HEADERS_KEY}
      - COSTAFF_LICENSE_PATH=/app/costaff-license.yaml
    command: python mcp_servers/server.py

  costaff-agent-costaff:
    build:
      context: agents
      dockerfile: Dockerfile
    container_name: costaff-agent-costaff
    restart: on-failure
    ports:
      # adk web has NO authentication — published on localhost only by
      # default. Hosts that must expose it to other machines (e.g. a
      # federated WebChat Enterprise routing to this manager) opt in with
      # COSTAFF_AGENT_BIND=0.0.0.0 in .env, behind a firewall or tunnel.
      - "${COSTAFF_AGENT_BIND:-127.0.0.1}:${COSTAFF_AGENT_PORT:-18080}:8080"
    env_file:
      - .env
    volumes:
      - ${COSTAFF_WORKSPACE_DIR:?COSTAFF_WORKSPACE_DIR must be set in .env - run costaff onboard}/shared:/app/data/shared
    environment:
      - MCP_SERVER_URLS=${MCP_SERVER_URLS}
      - ADK_SESSION_SERVICE_URI=${ADK_SESSION_SERVICE_URI:?ADK_SESSION_SERVICE_URI must be set in .env}
      - MCP_SECRET_KEY=${MCP_SECRET_KEY}
      - CODING_A2A_URL=${CODING_A2A_URL:-}
    command: ["adk", "web", "--host", "0.0.0.0", "--port", "8080", "--session_service_uri", "${ADK_SESSION_SERVICE_URI}", "."]
    depends_on:
      - costaff-mcp-costaff

  postgres:
    image: postgres:15-alpine
    container_name: costaff-postgres
    restart: always
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-costaff}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-costaff_pass}
      - POSTGRES_DB=${POSTGRES_DB:-costaff_db}
    ports:
      # Containers reach Postgres via the internal network (postgres:5432);
      # this published port exists only for host-side CLI/db tools, so it
      # stays on localhost. Set POSTGRES_BIND=0.0.0.0 to expose it.
      - "${POSTGRES_BIND:-127.0.0.1}:${POSTGRES_PORT:-5432}:5432"
    volumes:
      - costaff_db_data:/var/lib/postgresql/data

volumes:
  costaff_db_data:
    name: costaff_db_data

networks:
  default:
    name: costaff_default
